<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pantheon AI Lab Experiments</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffdf9;
      --ink: #172127;
      --muted: #687277;
      --line: #ddd2c3;
      --accent: #0e715d;
    }
    body {
      margin: 0;
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #e4efe8 0, #f4efe6 40%, #fbf8f2 100%);
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 16px 40px rgba(23, 53, 44, 0.07);
    }
    .panel {
      margin-top: 18px;
    }
    h1 {
      margin: 0;
      font-size: 32px;
    }
    .sub {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.8;
    }
    .list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .item {
      display: block;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fbfffd;
      text-decoration: none;
      color: inherit;
    }
    .item:hover {
      border-color: var(--accent);
      box-shadow: 0 12px 30px rgba(12, 107, 88, 0.10);
    }
    .name {
      font-size: 18px;
      font-weight: 800;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Pantheon AI Lab Experiments</h1>
      <div class="sub">这是 GitHub Pages 用的静态入口页。当前按用户 ID 分目录组织实验，后续可以继续追加更多用户和更多实验。</div>
    </section>
    <section class="panel">
      <div class="list">
        <a class="item" href="./id001/index.html">
          <div class="name">id001</div>
          <div class="meta">入口路径：/id001/</div>
        </a>
      </div>
    </section>
  </div>
</body>
</html>
